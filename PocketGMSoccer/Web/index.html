const { useState, useEffect, useRef, useMemo } = React;
// Global "open this player's full card" handler, provided at App root so a player's
// name is clickable ANYWHERE (squad, leaders, transfers, fixtures, ...).
const PlayerCtx = React.createContext(null);

/* =========================================================================
   POCKET GM — SOCCER   (single-file React)
   Full football-manager suite: squad, formations (multi-position players!),
   double round-robin league sim across two divisions with promotion &
   relegation, a domestic knockout cup, stat leaders, finances/contracts,
   the transfer market + free agency, a youth academy, season awards, a

   ========================================================================= */

/* ----------------------------- RNG / utils ----------------------------- */
let _rng = Math.random;
function setRng(fn){ _rng = fn || Math.random; }
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rint = (a, b) => Math.floor(_rng() * (b - a + 1)) + a;
const pick = arr => arr[Math.floor(_rng() * arr.length)];
const chance = p => _rng() < p;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const round = Math.round;
function gauss(mean, sd){
  let u = 0, v = 0;
  while (u === 0) u = _rng();
  while (v === 0) v = _rng();
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
const rateGauss = (mean, sd) => clamp(round(gauss(mean, sd)), 20, 99);
const n01 = r => clamp((r - 20) / 79, 0, 1);   // normalize 20..99 -> 0..1
const money = m => (Math.abs(m) >= 1 ? "£" + m.toFixed(1) + "M" : "£" + round(m * 1000) + "K");
function wpick(arr, wfn){
  let tot = 0; arr.forEach(x => tot += Math.max(0, wfn(x)));
  if(tot <= 0) return arr.length ? pick(arr) : null;
  let r = _rng() * tot;
  for(const x of arr){ const w = Math.max(0, wfn(x)); if(r < w) return x; r -= w; }
  return arr[arr.length-1];
}
function poisson(lambda){
  lambda = clamp(lambda, 0.02, 8);
  const L = Math.exp(-lambda); let k = 0, p = 1;
  do { k++; p *= _rng(); } while(p > L);
  return k - 1;
}
// Player-id generator. Resets to 1 each page load, but ids persist in the save; after
// loading we MUST resume past the highest existing id (uid.atLeast in migrate) or newly
// generated players (youth, FA fill) reuse low ids and overwrite existing players.
const uid = (() => { let i = 1; const f = () => i++; f.atLeast = n => { if(Number.isFinite(n) && n >= i) i = n + 1; }; return f; })();

const LAST = ["Walker","Brooks","Hayes","Bennett","Foster","Carter","Reyes","Diaz","Lopez","Ortega","Vargas","Santos","Silva","Costa","Fernandes","Pereira","Oliveira","Ribeiro","Almeida","Carvalho","Rossi","Bianchi","Romano","Greco","Conti","Moretti","Muller","Schmidt","Fischer","Weber","Wagner","Becker","Hoffmann","Schulz","Koch","Bauer","Klein","Wolf","Neumann","Dubois","Laurent","Moreau","Lefebvre","Garcia","Martinez","Rodriguez","Gonzalez","Hernandez","Perez","Sanchez","Ramirez","Torres","Flores","Rivera","Gomez","Ruiz","Alvarez","Castillo","Ibrahimovic","Larsson","Eriksson","Andersson","Nilsson","Hansen","Pedersen","Berg","Lindqvist","Virtanen","Korhonen","Novak","Horvat","Kovac","Petrov","Ivanov","Popov","Sokolov","Volkov","Kuznetsov","Mensah","Owusu","Boateng","Diop","Traore","Kone","Toure","Cisse","Ndiaye","Bah","Okafor","Adeyemi","Eze","Saka","Rashford","Sterling","Kane","Foden","Mount","Grealish","Bellingham","Rice","Sancho","Maguire","Stones","Trippier","Pickford","Henderson","Alexander","Wan","Gallagher","Palmer","Watkins","Toney","Maddison","Bowen","Ramsdale"];

/* ----------------------------- positions ------------------------------- */
// Canonical positions used in formations and player generation.
const ALL_POS = ["GK","RB","CB","LB","RWB","LWB","CDM","CM","CAM","RM","LM","RW","LW","ST"];
const GROUP = pos => pos==="GK" ? "GK"
  : ["RB","CB","LB","RWB","LWB"].includes(pos) ? "DEF"
  : ["CDM","CM","CAM","RM","LM"].includes(pos) ? "MID" : "ATT";
// Vertical band on the pitch (0 = goal line .. 5 = attack), used for the pitch
// diagram AND for the out-of-position penalty (same band = small penalty).
const BAND = { GK:0, RB:1, CB:1, LB:1, RWB:1, LWB:1, CDM:2, CM:3, RM:3, LM:3, CAM:4, RW:5, LW:5, ST:5 };

// Per-position OVR weights over the six outfield attributes + gk. Each sums ~1.0.
const POS_W = {
  GK:  {gk:.70, phy:.14, pas:.16},
  CB:  {def:.46, phy:.24, pas:.12, pac:.13, dri:.05},
  RB:  {def:.34, pac:.22, phy:.14, pas:.16, dri:.14},
  LB:  {def:.34, pac:.22, phy:.14, pas:.16, dri:.14},
  RWB: {def:.30, pac:.24, phy:.13, pas:.17, dri:.16},
  LWB: {def:.30, pac:.24, phy:.13, pas:.17, dri:.16},
  CDM: {def:.34, pas:.26, phy:.20, dri:.12, sho:.08},
  CM:  {pas:.30, dri:.20, def:.18, phy:.14, sho:.18},
  CAM: {pas:.28, dri:.26, sho:.24, pac:.12, phy:.10},
  RM:  {pac:.24, dri:.26, pas:.20, sho:.18, phy:.12},
  LM:  {pac:.24, dri:.26, pas:.20, sho:.18, phy:.12},
  RW:  {pac:.26, dri:.27, sho:.22, pas:.15, phy:.10},
  LW:  {pac:.26, dri:.27, sho:.22, pas:.15, phy:.10},
  ST:  {sho:.38, pac:.22, dri:.18, phy:.14, pas:.08},
};
// Attribute tilts (added to a base mean) so a generated player's raw attributes suit
// his position (a striker shoots, a centre-back defends, a keeper has 'keeping').
const POS_TILT = {
  GK:  {pac:-18, sho:-26, pas:-2, dri:-12, def:-10, phy:6,  gk:20},
  CB:  {pac:-6,  sho:-18, pas:-6, dri:-12, def:18,  phy:12, gk:-30},
  RB:  {pac:8,   sho:-10, pas:2,  dri:2,   def:8,   phy:2,  gk:-30},
  LB:  {pac:8,   sho:-10, pas:2,  dri:2,   def:8,   phy:2,  gk:-30},
  RWB: {pac:12,  sho:-6,  pas:4,  dri:6,   def:4,   phy:0,  gk:-30},
  LWB: {pac:12,  sho:-6,  pas:4,  dri:6,   def:4,   phy:0,  gk:-30},
  CDM: {pac:-2,  sho:-6,  pas:6,  dri:0,   def:12,  phy:10, gk:-30},
  CM:  {pac:2,   sho:2,   pas:10, dri:6,   def:2,   phy:4,  gk:-30},
  CAM: {pac:4,   sho:8,   pas:10, dri:10,  def:-8,  phy:-2, gk:-30},
  RM:  {pac:12,  sho:4,   pas:6,  dri:10,  def:-4,  phy:-2, gk:-30},
  LM:  {pac:12,  sho:4,   pas:6,  dri:10,  def:-4,  phy:-2, gk:-30},
  RW:  {pac:14,  sho:8,   pas:4,  dri:12,  def:-10, phy:-4, gk:-30},
  LW:  {pac:14,  sho:8,   pas:4,  dri:12,  def:-10, phy:-4, gk:-30},
  ST:  {pac:10,  sho:18,  pas:-2, dri:8,   def:-14, phy:6,  gk:-30},
};
// Secondary-position eligibility graph — THE multi-position feature. A generated player
// gets his primary position plus 1–3 related secondaries he can also play, so many
// formations are viable (a RW who can fill RM/ST, a CB who covers RB/CDM, ...).
const POS_ADJ = {
  GK:["GK"],
  RB:["RB","RWB","CB","RM"], LB:["LB","LWB","CB","LM"],
  RWB:["RWB","RB","RM","RW"], LWB:["LWB","LB","LM","LW"],
  CB:["CB","RB","LB","CDM"],
  CDM:["CDM","CM","CB"], CM:["CM","CDM","CAM"],
  CAM:["CAM","CM","RW","LW","ST"],
  RM:["RM","RW","RWB","CM"], LM:["LM","LW","LWB","CM"],
  RW:["RW","RM","LW","ST","CAM"], LW:["LW","LM","RW","ST","CAM"],
  ST:["ST","CAM","RW","LW"],
};
function rollPositions(primary){
  const opts = (POS_ADJ[primary] || [primary]).filter(p => p !== primary);
  const set = [primary];
  if(primary !== "GK"){
    const k = chance(0.18) ? 0 : chance(0.55) ? 1 : chance(0.75) ? 2 : 3;
    for(let i=0;i<k && opts.length;i++){ const c = pick(opts); if(!set.includes(c)) set.push(c); }
  }
  return set;
}
// out-of-position penalty applied to a player's effective rating when fielded at `slot`.
function posPenalty(player, slot){
  if((player.positions||[player.pos]).includes(slot)) return 0;
  const pb = BAND[slot];
  const near = (player.positions||[player.pos]).some(p => Math.abs(BAND[p]-pb) <= 1);
  return near ? 7 : 16;
}
const posLabel = p => (p.positions && p.positions.length>1)
  ? p.positions[0] + " (" + p.positions.slice(1).join(",") + ")" : p.pos;

/* ----------------------------- formations ------------------------------ */
const FORMATIONS = {
  "4-4-2":          ["GK","RB","CB","CB","LB","RM","CM","CM","LM","ST","ST"],
  "4-3-3":          ["GK","RB","CB","CB","LB","CM","CM","CM","RW","ST","LW"],
  "4-3-3 (DM)":     ["GK","RB","CB","CB","LB","CDM","CM","CM","RW","ST","LW"],
  "4-2-3-1":        ["GK","RB","CB","CB","LB","CDM","CDM","RM","CAM","LM","ST"],
  "4-4-2 Diamond":  ["GK","RB","CB","CB","LB","CDM","CM","CM","CAM","ST","ST"],
  "4-5-1":          ["GK","RB","CB","CB","LB","RM","CM","CM","CM","LM","ST"],
  "3-5-2":          ["GK","CB","CB","CB","RWB","CM","CM","CM","LWB","ST","ST"],
  "3-4-3":          ["GK","CB","CB","CB","RM","CM","CM","LM","RW","ST","LW"],
  "5-3-2":          ["GK","RWB","CB","CB","CB","LWB","CM","CM","CM","ST","ST"],
};
const FORMATION_NAMES = Object.keys(FORMATIONS);
// Pitch coordinates (x,y in 0..100) for a formation, derived from each slot's band so the
// formation editor can draw a top-down pitch. y: GK near own goal (90) .. attack (14).
function pitchCoords(slots){
  const Y = {0:90, 1:72, 2:60, 3:46, 4:32, 5:16};
  const byBand = {};
  slots.forEach((pos,i)=>{ const b=BAND[pos]; (byBand[b]=byBand[b]||[]).push(i); });
  const xy = new Array(slots.length);
  Object.keys(byBand).forEach(b=>{
    const idxs = byBand[b]; const n = idxs.length;
    idxs.forEach((slotIdx,k)=>{
      const x = n===1 ? 50 : 12 + (76*k)/(n-1);
      xy[slotIdx] = { x, y: Y[b] };
    });
  });
  return xy;
}

  ["Stonegate","FC","STO"],["Thornbury","United","THB"],
  ["Underwood","City","UND"],["Valeford","Rovers","VAL"],["Westcliff","Athletic","WES"],

  ["Carrowmore","City","CAR"],["Dunfield","Rovers","DUN"],["Ellerby","Athletic","ELL"],
  ["Foxholme","Town","FOX"],["Gosforth","Wanderers","GOS"],["Hartcliffe","United","HRT"],
  ["Inglewood","FC","ING"],["Kestonbury","City","KES"],["Lynmouth","Rovers","LYN"],
  ["Millbrook","Athletic","MIL"],["Norbeck","Town","NRB"],["Otterburn","United","OTT"],

/* ----------------------------- player gen ------------------------------ */
function emptyStats(){ return { App:0, Min:0, G:0, A:0, CS:0, YC:0, RC:0, MOTM:0, ratingSum:0, ratingN:0 }; }
function avgRating(s){ return s && s.ratingN ? s.ratingSum/s.ratingN : 0; }
function computeOvr(p){
  const w = POS_W[p.pos] || POS_W.CM;
  let s = 0; for(const k in w) s += w[k] * (p[k]||0);
  p.ovr = clamp(round(s), 20, 99);
  return p.ovr;
}
function setPotential(p){
  const room = clamp(round((25 - p.age) * 1.7 + gauss(2,4)), -4, 26);
  p.pot = clamp(p.ovr + Math.max(0, room), p.ovr, 99);
  if(p.age <= 20 && chance(0.05)) p.pot = clamp(p.pot + rint(12,26), p.ovr, 99);   // rare wonderkid
}
// wage (£M/yr) and transfer value (£M) from ability, age and contract.
function wageFor(p){
  let s = Math.pow(Math.max(0, p.ovr-40)/59, 2.1) * 22;
  if(p.age < 23) s *= 0.5; else if(p.age < 27) s *= 0.82;
  return clamp(round(s*10)/10, 0.2, 30);
}
function abilityValue(o){ return Math.pow(Math.max(0, o-35)/45, 2.6) * 90; }
function playerValue(p){
  const pot = p.pot || p.ovr;
  const youth = clamp((27 - p.age) / 12, 0, 1);
  const projOvr = p.ovr + (pot - p.ovr) * youth;
  const cur = abilityValue(p.ovr), fut = abilityValue(projOvr);
  const w = 0.30 + 0.50 * youth;
  let v = cur * (1 - w) + fut * w;
  if(p.age >= 30) v *= clamp(1 - (p.age - 29) * 0.07, 0.35, 1);
  return Math.max(0.2, round(v*10)/10);
}
function makePlayer(pos, ageRange, meanAdj=0){
  const age = rint(ageRange[0], ageRange[1]);
  const tilt = POS_TILT[pos] || POS_TILT.CM;
  const base = 52 + meanAdj;
  const p = {
    id: uid(), name: genName(), age, pos, positions: rollPositions(pos), isGK: pos==="GK",
    foot: chance(0.75) ? "R" : (chance(0.85) ? "L" : "B"), num: rint(1,40),
    pac: rateGauss(base+tilt.pac,11), sho: rateGauss(base+tilt.sho,12),
    pas: rateGauss(base+tilt.pas,11), dri: rateGauss(base+tilt.dri,11),
    def: rateGauss(base+tilt.def,12), phy: rateGauss(base+tilt.phy,11),
    gk:  rateGauss(base+tilt.gk,12),
    stats: emptyStats(), career: emptyStats(), history: [],
  };
  // ~7% of players are standouts — a fat top end so elite talent stands apart
  if(chance(0.07)){
    const b = rint(7,16);
    ["pac","sho","pas","dri","def","phy","gk"].forEach(k=>{
      const wt = (POS_W[pos]||{})[k] || 0;
      if(wt > 0.10) p[k] = clamp(p[k] + b, 20, 99);
    });
  }
  computeOvr(p); setPotential(p); p.peakOvr = p.ovr;
  p.salary = wageFor(p); p.years = rint(1,4); p.value = playerValue(p);
  return p;
}

/* ----------------------------- league gen ------------------------------ */
const STADIUM_NAMES = ["Riverside","Highbury Park","The Den","Elm Road","Victoria Park","Stonebridge","Old Mill Ground","Kingsmeadow","Fortress Park","Saxon Field","The Crucible","Moorland Stadium","Tunstall Park","Greenfield","Castle Road","Harbour End","Abbey Stadium","Brookvale","Sandhill Park","Penrose Ground","Whitmore Park","Cathedral Ground","Eastlands","The Vale","Brightside Park","Lowfields","Mariners Park","Cliffe End","Ashwood Stadium","Foundry Park","Northgate","Belmont Ground","Carrow End","Deepdale Park","Goldstone Ground","Hillsborough Park","Loftus Field","Maine Ground","New Den","Priory Park"];
function makeClub(def, idx, div){
  const [city, nick, abbr] = def;
  return {
    id: idx, city, nick, abbr, name: city + " " + nick, div,
    stadium: STADIUM_NAMES[idx % STADIUM_NAMES.length], capacity: rint(18,62)*1000,
    pld:0, w:0, d:0, l:0, gf:0, ga:0, pts:0,
    budget: rint(20,140) + (div===0?60:0), formation: "4-3-3", xi: [], bench: [],
    academy: { level: 1 }, history: [],
    userControlled: false,
  };
}
function buildSquad(clubId, div){
  const players = [];
  const meanAdj = div===0 ? 0 : -8;   // second-tier clubs are a notch weaker
  // a balanced senior squad: 3 GK, 7 DEF, 8 MID, 5 ATT = 23
  const plan = ["GK","GK","GK","RB","LB","CB","CB","CB","RWB","LWB",
    "CDM","CM","CM","CAM","RM","LM","CM","RW","LW","ST","ST","CAM","RW"];
  plan.forEach(pos => { const ageR = chance(0.25)?[18,22]:[22,33]; players.push(makePlayer(pos, ageR, meanAdj)); });
  players.forEach(p => p.teamId = clubId);
  return players;
}
function generateLeague(userTeamId, opts={}){
  const { seed=null } = opts;
  if(seed!=null && !Number.isNaN(seed)) setRng(mulberry32(seed >>> 0));
  const clubs = CLUB_DEFS.map((d,i)=>makeClub(d, i, i < TEAMS_PER_DIV ? 0 : 1));
  clubs[userTeamId].userControlled = true;
  const players = {};
  clubs.forEach(c => buildSquad(c.id, c.div).forEach(p => players[p.id] = p));
  clubs.forEach(c => autoPickXI(c, players));
  setRng(null);
  return { clubs, players };
}

/* ----------------------------- schedule -------------------------------- */
// Double round-robin per division via the circle method: 20 teams -> 38 rounds.
// Returns rounds[]; each round = array of {home, away, div, played, hs, as}.
function divRounds(clubIds){
  const ids = clubIds.slice();
  if(ids.length % 2) ids.push(null);
  const n = ids.length, half = n/2;
  const fixed = ids[0]; let rot = ids.slice(1);
  const firstLeg = [];
  for(let r=0;r<n-1;r++){
    const row = rot.slice(); const arr = [fixed].concat(row);
    const games = [];
    for(let i=0;i<half;i++){
      const a = arr[i], b = arr[n-1-i];
      if(a==null || b==null) continue;
      // alternate home/away by round for balance
      games.push(r%2===0 ? {home:a, away:b} : {home:b, away:a});
    }
    firstLeg.push(games);
    rot = [rot[rot.length-1]].concat(rot.slice(0, rot.length-1));   // rotate
  }
  // second leg = reverse fixtures
  const secondLeg = firstLeg.map(games => games.map(g => ({home:g.away, away:g.home})));
  return firstLeg.concat(secondLeg);
}
function buildSchedule(clubs){
  const divs = [[],[]];
  clubs.forEach(c => divs[c.div].push(c.id));
  const r0 = divRounds(divs[0]), r1 = divRounds(divs[1]);
  const nRounds = Math.max(r0.length, r1.length);
  const rounds = [];
  for(let i=0;i<nRounds;i++){
    const games = [];
    (r0[i]||[]).forEach(g => games.push({ home:g.home, away:g.away, div:0, played:false, hs:0, as:0 }));
    (r1[i]||[]).forEach(g => games.push({ home:g.home, away:g.away, div:1, played:false, hs:0, as:0 }));
    rounds.push(games);
  }
  return rounds;
}

/* ----------------------------- match sim ------------------------------- */
// Effective rating of player `p` if fielded at formation `slot`.
function effRating(p, slot){ return Math.max(20, p.ovr - posPenalty(p, slot)); }
// Three unit ratings (DEF / MID / ATT) for a club's current XI, 20..99-ish.
function unitRatings(club, players){
  const slots = FORMATIONS[club.formation] || FORMATIONS["4-3-3"];
  const xi = (club.xi||[]).map((id,i)=>({ p: players[id], slot: slots[i] })).filter(o=>o.p);
  let dS=0,dN=0, mS=0,mN=0, aS=0,aN=0, gk=50;
  xi.forEach(({p,slot})=>{
    const er = effRating(p, slot), b = BAND[slot];
    if(slot==="GK"){ gk = p.gk; return; }
    if(b<=2){ dS+=er; dN++; }
    else if(b===3){ mS+=er; mN++; }
    else { aS+=er; aN++; }
    if(b===2){ mS+=er*0.5; mN+=0.5; }   // DMs help midfield too
  });
  const DEF = (dN? dS/dN : 50)*0.7 + gk*0.3;
  const MID = mN? mS/mN : 50;
  const ATT = aN? aS/aN : 50;
  return { DEF, MID, ATT, gk };
}
function clubStrength(club, players){
  const u = unitRatings(club, players);
  return round(0.34*u.DEF + 0.33*u.MID + 0.33*u.ATT);
}
const TACTIC_MOD = {
  attacking: { xgFor:1.16, xgAgainst:1.12 },
  balanced:  { xgFor:1.0,  xgAgainst:1.0 },
  defensive: { xgFor:0.86, xgAgainst:0.83 },
};
// Simulate one match. Mutates player season stats + both clubs' table rows.
// Returns a box-score object (used to show the user's match in detail).
function simMatch(home, away, players, opts={}){
  const neutral = !!opts.neutral;
  const uH = unitRatings(home, players), uA = unitRatings(away, players);
  const hAtt = (0.55*n01(uH.ATT) + 0.30*n01(uH.MID) + 0.15*n01(uH.DEF));
  const hDef = (0.55*n01(uH.DEF) + 0.30*n01(uH.MID) + 0.15*n01(uH.ATT));
  const aAtt = (0.55*n01(uA.ATT) + 0.30*n01(uA.MID) + 0.15*n01(uA.DEF));
  const aDef = (0.55*n01(uA.DEF) + 0.30*n01(uA.MID) + 0.15*n01(uA.ATT));
  const tH = TACTIC_MOD[home.tactic||"balanced"], tA = TACTIC_MOD[away.tactic||"balanced"];
  const homeAdv = neutral ? 1 : 1.12, awayAdv = neutral ? 1 : 0.92;
  let xgH = clamp(1.32 * Math.exp(1.7*(hAtt - aDef)) * tH.xgFor * tA.xgAgainst * homeAdv, 0.15, 5.5);
  let xgA = clamp(1.32 * Math.exp(1.7*(aAtt - hDef)) * tA.xgFor * tH.xgAgainst * awayAdv, 0.15, 5.5);
  let hs = poisson(xgH), as = poisson(xgA);
  if(opts.mustDecide && hs===as){ if(chance(clamp(0.5+(clubStrength(home,players)-clubStrength(away,players))/40,0.1,0.9))) hs++; else as++; }
  const box = { home, away, hs, as, hScorers:[], aScorers:[], hRatings:[], aRatings:[], neutral };
  applyMatch(home, away, hs, as, players, box, opts);
  return box;
}
function lineupOf(club, players){
  const slots = FORMATIONS[club.formation] || FORMATIONS["4-3-3"];
  return (club.xi||[]).map((id,i)=>({ p: players[id], slot: slots[i] })).filter(o=>o.p && !isInjured(o.p));
}
// attacking weight of a slot (who tends to score) and creative weight (who assists)
const SCORE_W = { GK:0, RB:0.6, LB:0.6, CB:0.7, RWB:0.9, LWB:0.9, CDM:1.0, CM:2.2, CAM:4.5, RM:3.2, LM:3.2, RW:5.5, LW:5.5, ST:9 };
const CREATE_W = { GK:0, RB:1.2, LB:1.2, CB:0.4, RWB:2.0, LWB:2.0, CDM:1.4, CM:3.2, CAM:5.0, RM:4.2, LM:4.2, RW:4.5, LW:4.5, ST:2.2 };
function applyMatch(home, away, hs, as, players, box, opts){
  const isCup = !!opts.cup;
  const H = lineupOf(home, players), A = lineupOf(away, players);
  // appearances + minutes for everyone who started (90'); a couple of bench cameos
  function credit(side, club){
    side.forEach(({p})=>{ p.stats.App++; p.stats.Min += 90; });
    const bench = (club.bench||[]).map(id=>players[id]).filter(p=>p && !isInjured(p));
    bench.slice(0,3).forEach(p=>{ if(chance(0.5)){ p.stats.App++; p.stats.Min += rint(8,30); } });
  }
  credit(H, home); credit(A, away);
  // distribute goals to scorers + assisters
  function awardGoals(side, n){
    const out = [];
    for(let i=0;i<n;i++){
      const sc = wpick(side, o => (SCORE_W[o.slot]||0) * (0.5 + n01(o.p.sho)));
      if(!sc) continue;
      sc.p.stats.G++;
      const min = rint(1,90);
      let assistName = null, assistId = null;
      if(chance(0.72)){
        const cands = side.filter(o => o !== sc);
        const as2 = wpick(cands, o => (CREATE_W[o.slot]||0) * (0.5 + n01(o.p.pas*0.6 + o.p.dri*0.4)));
        if(as2){ as2.p.stats.A++; assistName = as2.p.name; assistId = as2.p.id; }
      }
      out.push({ name: sc.p.name, id: sc.p.id, min, assist: assistName, assistId });
    }
    out.sort((a,b)=>a.min-b.min);
    return out;
  }
  box.hScorers = awardGoals(H, hs);
  box.aScorers = awardGoals(A, as);
  // clean sheets
  if(as===0) H.forEach(({p,slot})=>{ if(BAND[slot]<=2 || slot==="GK") p.stats.CS++; });
  if(hs===0) A.forEach(({p,slot})=>{ if(BAND[slot]<=2 || slot==="GK") p.stats.CS++; });
  // cards (light)
  [H,A].forEach(side => side.forEach(({p,slot})=>{
    const yc = clamp(0.10 + (BAND[slot]<=2?0.06:0) - n01(p.phy)*0.04, 0.04, 0.22);
    if(chance(yc)) p.stats.YC++;
    if(chance(0.01)) { p.stats.RC++; injure(p, rint(2,4)); }
  }));
  // ratings + man of the match
  const res = hs>as?1 : hs<as?-1 : 0;
  function rate(side, scored, conceded, result){
    let best=null, bestR=0;
    side.forEach(({p,slot})=>{
      let r = 6.2 + (result>0?0.4:result<0?-0.3:0);
      r += 0.95 * countGoals(box, p.id);
      r += 0.55 * countAssists(box, p.id);
      if(conceded===0 && (BAND[slot]<=2||slot==="GK")) r += 0.6;
      if(conceded>=3 && (BAND[slot]<=2||slot==="GK")) r -= 0.5;
      r = clamp(r + gauss(0, 0.35), 4.0, 10);
      p.stats.ratingSum += r; p.stats.ratingN++;
      if(r>bestR){ bestR=r; best=p; }
    });
    return best;
  }
  const motmH = rate(H, hs, as, res), motmA = rate(A, as, hs, -res);
  const motm = (res>=0 ? motmH : motmA) || motmH || motmA;
  if(motm) motm.stats.MOTM++;
  box.motm = motm ? motm.name : null;
  // standings (cup matches don't affect the league table)
  if(!isCup){
    home.pld++; away.pld++; home.gf+=hs; home.ga+=as; away.gf+=as; away.ga+=hs;
    if(hs>as){ home.w++; home.pts+=3; away.l++; }
    else if(hs<as){ away.w++; away.pts+=3; home.l++; }
    else { home.d++; away.d++; home.pts++; away.pts++; }
  }
}
function countGoals(box, id){ return box.hScorers.filter(s=>s.id===id).length + box.aScorers.filter(s=>s.id===id).length; }
function countAssists(box, id){ return box.hScorers.concat(box.aScorers).filter(s=>s.assistId===id).length; }

/* ----------------------------- injuries -------------------------------- */
function isInjured(p){ return !!(p && p.injury && p.injury.weeks > 0); }
function injure(p, weeks){ p.injury = { weeks, type: pick(["knock","hamstring","ankle","muscle strain"]) }; }
function maybeInjure(club, players, settings){
  if(settings && settings.injuries===false) return;
  const xi = (club.xi||[]).map(id=>players[id]).filter(Boolean);
  xi.forEach(p=>{ if(!isInjured(p) && chance(0.012)) injure(p, rint(1,6)); });
}

/* ----------------------------- XI selection ---------------------------- */
// Auto-pick the best available XI for a club's current formation, honoring each
// player's position eligibility (least penalty + highest rating wins each slot).
function autoPickXI(club, players){
  const slots = FORMATIONS[club.formation] || FORMATIONS["4-3-3"];
  const squad = Object.values(players).filter(p => p.teamId===club.id && !isInjured(p));
  const used = new Set();
  const xi = [];
  slots.forEach(slot=>{
    let best=null, bestScore=-1;
    squad.forEach(p=>{
      if(used.has(p.id)) return;
      const score = effRating(p, slot);
      if(score>bestScore){ bestScore=score; best=p; }
    });
    if(best){ used.add(best.id); xi.push(best.id); }
  });
  club.xi = xi;
  // bench: best remaining, keeping a keeper first
  const rest = squad.filter(p=>!used.has(p.id)).sort((a,b)=>b.ovr-a.ovr);
  const benchGK = rest.find(p=>p.pos==="GK");
  const bench = [];
  if(benchGK) bench.push(benchGK.id);
  rest.forEach(p=>{ if(bench.length<9 && p.id!==(benchGK&&benchGK.id)) bench.push(p.id); });
  club.bench = bench;
}
function ensureXI(club, players){ if(!club.xi || club.xi.length<11) autoPickXI(club, players); }

/* ----------------------------- standings ------------------------------- */
function tableFor(G, div){
  return G.clubs.filter(c=>c.div===div).slice().sort((a,b)=>
    b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf || a.name.localeCompare(b.name));
}
function leaguePos(G, club){ return tableFor(G, club.div).findIndex(c=>c.id===club.id) + 1; }

/* ----------------------------- domestic cup ---------------------------- */
// 32-team knockout: all 20 top-flight clubs + the 12 highest-rated second-tier clubs.
// Rounds resolve on set matchdays. Single match; a draw is decided by strength coin-flip.
const CUP_NAME = "Pocket Cup";
const CUP_MD = { 6:"R32", 13:"R16", 21:"QF", 29:"SF", 36:"Final" };
function initCup(G){
  const top = G.clubs.filter(c=>c.div===0).map(c=>c.id);
  const second = G.clubs.filter(c=>c.div===1)
    .sort((a,b)=>clubStrength(b,G.players)-clubStrength(a,G.players)).slice(0,12).map(c=>c.id);
  let pool = top.concat(second);
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(_rng()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  G.cup = { alive: pool, round: "R32", ties: [], history: [], winner: null, results: {} };
}
function playCupRound(G){
  const cup = G.cup; if(!cup || cup.winner) return;
  const ids = cup.alive.slice();
  const winners = [], ties = [];
  for(let i=0;i<ids.length;i+=2){
    const a = G.clubs[ids[i]], b = G.clubs[ids[i+1]];
    if(!b){ winners.push(ids[i]); continue; }
    ensureXI(a, G.players); ensureXI(b, G.players);
    const box = simMatch(a, b, G.players, { cup:true, neutral: cup.round==="Final", mustDecide:true });
    const w = box.hs>=box.as ? a.id : b.id;   // mustDecide guarantees no draw
    winners.push(w);
    ties.push({ home:a.id, away:b.id, hs:box.hs, as:box.as, win:w });
  }
  cup.results[cup.round] = ties;
  cup.history.unshift({ round: cup.round, ties });
  if(winners.length===1){ cup.winner = winners[0]; cup.alive = winners; }
  else {
    cup.alive = winners;
    const order = ["R32","R16","QF","SF","Final"];
    cup.round = order[order.indexOf(cup.round)+1] || "Final";
  }
}

/* ----------------------------- sim loop -------------------------------- */
function simRound(G){
  if(G.phase!=="regular") return;
  const round = G.schedule[G.day]; if(!round) return;
  // tactic context for the user's club (its chosen formation/tactic already on the club)
  round.forEach(g=>{
    const home = G.clubs[g.home], away = G.clubs[g.away];
    ensureXI(home, G.players); ensureXI(away, G.players);
    const box = simMatch(home, away, G.players, {});
    g.played = true; g.hs = box.hs; g.as = box.as;
    if(home.id===G.userTeamId || away.id===G.userTeamId){
      G.lastMatch = serializeBox(box, G);
      logNews(G, "match", `${home.abbr} ${box.hs}-${box.as} ${away.abbr}`, G.userTeamId);
    }
    maybeInjure(home, G.players, G.settings); maybeInjure(away, G.players, G.settings);
  });
  // injuries heal a week
  Object.values(G.players).forEach(p=>{ if(isInjured(p)) p.injury.weeks--; });
  // domestic cup round on its matchday
  if(CUP_MD[G.day+1] && G.cup && !G.cup.winner){ playCupRound(G); if(G.cup.winner!=null && CUP_MD[G.day+1]==="Final"){ const wc=G.clubs[G.cup.winner]; logNews(G,"cup",`🏆 ${wc.name} win the ${CUP_NAME}!`, wc.id); } }
  G.day++;
  if(G.day >= G.schedule.length){ G.phase = "offseason"; finalizeSeason(G); }
}
function serializeBox(box, G){
  return {
    season: G.season, day: G.day+1,
    home: box.home.abbr, away: box.away.abbr, homeName: box.home.name, awayName: box.away.name,
    hs: box.hs, as: box.as, neutral: box.neutral, cup: !!box.cup,
    hScorers: box.hScorers, aScorers: box.aScorers, motm: box.motm,
  };
}
// sim forward until the user's next league match is about to be played (or season end)
function simToNextUserMatch(G){
  let guard = 0;
  while(G.phase==="regular" && guard++ < 60){
    simRound(G);
    if(G.phase!=="regular") break;
    const next = G.schedule[G.day];
    if(next && next.some(g=>g.home===G.userTeamId || g.away===G.userTeamId)) break;
  }
}

/* ----------------------------- offseason ------------------------------- */
function finalizeSeason(G){
  // champion + awards
  const top = tableFor(G, 0);
  const champ = top[0];
  G.champions = G.champions || [];
  G.champions.unshift({ season:G.season, id:champ.id, abbr:champ.abbr });
  logNews(G, "title", `🏆 ${champ.name} are champions of the ${DIV_NAMES[0]}!`, champ.id);
  computeAwards(G);
  G.phase = "offseason";
}
function computeAwards(G){
  const all = Object.values(G.players).filter(p=>p.teamId!=null && G.clubs[p.teamId] && G.clubs[p.teamId].div===0 && p.stats.App>=10);
  const boot = all.slice().sort((a,b)=>b.stats.G-a.stats.G)[0];
  const glove = all.filter(p=>p.pos==="GK").sort((a,b)=>b.stats.CS-a.stats.CS)[0];
  const pots = all.slice().sort((a,b)=>(avgRating(b.stats)+b.stats.G*0.03+b.stats.A*0.02)-(avgRating(a.stats)+a.stats.G*0.03+a.stats.A*0.02))[0];
  const yng = all.filter(p=>p.age<=21).sort((a,b)=>avgRating(b.stats)-avgRating(a.stats))[0];
  const a = { season:G.season,
    pots: pots?{id:pots.id,name:pots.name,team:G.clubs[pots.teamId].abbr,r:+avgRating(pots.stats).toFixed(2)}:null,
    boot: boot?{id:boot.id,name:boot.name,team:G.clubs[boot.teamId].abbr,g:boot.stats.G}:null,
    glove: glove?{id:glove.id,name:glove.name,team:G.clubs[glove.teamId].abbr,cs:glove.stats.CS}:null,
    young: yng?{id:yng.id,name:yng.name,team:G.clubs[yng.teamId].abbr,r:+avgRating(yng.stats).toFixed(2)}:null };
  G.awardHistory = G.awardHistory || []; G.awardHistory.unshift(a);
  if(pots){ pots.awards=(pots.awards||0)+1; }
  if(boot){ boot.golden=(boot.golden||0)+1; }
}
// Roll the franchise into the next season: archive stats, age & develop players, expire
// contracts, promotion/relegation, youth intake, finances, fresh fixtures + cup.
function startNextSeason(G){
  // archive each player's season into history + career, then reset season stats
  Object.values(G.players).forEach(p=>{
    if(p.stats.App>0){
      p.history = p.history || [];
      p.history.push({ season:G.season, team: p.teamId!=null && G.clubs[p.teamId] ? G.clubs[p.teamId].abbr : "—",
        App:p.stats.App, G:p.stats.G, A:p.stats.A, CS:p.stats.CS, r:+avgRating(p.stats).toFixed(2) });
      if(p.history.length>30) p.history = p.history.slice(-30);
      for(const k in p.stats) p.career[k] = (p.career[k]||0) + p.stats[k];
    }
    p.stats = emptyStats();
  });
  // record club season history + reset table
  G.clubs.forEach(c=>{
    c.history = c.history || [];
    c.history.push({ season:G.season, div:c.div, pos:leaguePos(G,c), w:c.w, d:c.d, l:c.l, gf:c.gf, ga:c.ga, pts:c.pts });
    if(c.history.length>40) c.history = c.history.slice(-40);
  });
  // age + develop everyone (rostered players AND the existing free-agent pool, once each —
  // do FAs here BEFORE expiries add new names so the just-released don't age twice)
  Object.values(G.players).forEach(p=>developPlayer(p));
  (G.freeAgents||[]).forEach(p=>developPlayer(p));
  hallOfFameCheck(G);
  // contracts: decrement, expiries become free agents
  G.freeAgents = G.freeAgents || [];
  Object.values(G.players).forEach(p=>{
    if(p.teamId==null) return;
    p.years = (p.years||1) - 1;
    if(p.years<=0){
      // AI clubs re-sign most of their useful players; the rest hit the market
      const club = G.clubs[p.teamId];
      if(club && club.userControlled){ p.years=0; }   // user must decide (renew in squad)
      else if(p.ovr>=58 && chance(0.78)){ p.years=rint(2,4); p.salary=wageFor(p); }
      else { releaseToFA(G, p); }
    }
  });
  // retirements (old, low-rated)
  Object.values(G.players).forEach(p=>{
    if(p.age>=34 && (p.ovr<62 || p.age>=39) && chance(p.age>=37?0.55:0.22)){
      if(p.teamId!=null){ logNews(G,"retire",`${p.name} (${p.pos}) retires at ${p.age}`, p.teamId); }
      delete G.players[p.id];
    }
  });
  // promotion / relegation: bottom 3 of Premier <-> top 3 of Championship
  const prem = tableFor(G,0), champ = tableFor(G,1);
  const down = prem.slice(-3), up = champ.slice(0,3);
  down.forEach(c=>{ c.div=1; logNews(G,"releg",`⬇️ ${c.name} are relegated to the ${DIV_NAMES[1]}`, c.id); });
  up.forEach(c=>{ c.div=0; logNews(G,"promo",`⬆️ ${c.name} are promoted to the ${DIV_NAMES[0]}`, c.id); });
  // finances: gate revenue from final position + cup run, pay nothing here (wages tracked live)
  G.clubs.forEach(c=>{
    const pos = leaguePos(G,c);
    const base = c.div===0 ? 70 : 18;
    const prize = c.div===0 ? clamp((21-pos)*3.0, 6, 60) : clamp((21-pos)*1.0, 2, 22);
    const gate = round(c.capacity/1000 * (c.div===0?0.55:0.30));
    c.budget = round((c.budget + base + prize + gate) * 10)/10;
    c.pld=0;c.w=0;c.d=0;c.l=0;c.gf=0;c.ga=0;c.pts=0;
  });
  // youth intake into every club, refill thin squads
  G.clubs.forEach(c=>youthIntake(G, c));
  G.clubs.forEach(c=>refillSquad(G, c));
  // thin the free-agent pool (already aged above)
  G.freeAgents = G.freeAgents.filter(p=>p.ovr>=48 || p.age<=23).slice(0,160);
  // fresh fixtures + cup + reset XIs
  G.season++; G.day=0; G.phase="regular";
  G.schedule = buildSchedule(G.clubs);
  initCup(G);
  G.clubs.forEach(c=>autoPickXI(c, G.players));
  G.transferOffers = [];
  G.lastMatch = null;
  setOwnerExpectation(G);
}
function developPlayer(p){
  p.age++;
  let delta = 0;
  if(p.age<=23) delta = (p.pot - p.ovr) > 0 ? rint(1, 4) : rint(0,1);
  else if(p.age<=27) delta = (p.pot - p.ovr) > 0 ? rint(0, 2) : 0;
  else if(p.age<=30) delta = -rint(0,1);
  else delta = -rint(1,3);
  // nudge the underlying attributes so OVR shifts coherently
  const keys = ["pac","sho","pas","dri","def","phy","gk"];
  const w = POS_W[p.pos]||{};
  const relevant = keys.filter(k=>(w[k]||0)>0.05);
  for(let i=0;i<Math.abs(delta);i++){
    const k = relevant.length?pick(relevant):pick(keys);
    p[k] = clamp(p[k] + (delta>0?1:-1), 20, 99);
  }
  // pace fades fastest with age
  if(p.age>=30) p.pac = clamp(p.pac - rint(0,2), 20, 99);
  computeOvr(p);
  p.peakOvr = Math.max(p.peakOvr||p.ovr, p.ovr);
  p.salary = wageFor(p); p.value = playerValue(p);
}
function releaseToFA(G, p){
  p.teamId = null; p.years = 0; p.injury = null;
  G.freeAgents = G.freeAgents || [];
  if(!G.freeAgents.some(x=>x.id===p.id)) G.freeAgents.push(p);
  delete G.players[p.id];
}
function youthIntake(G, club){
  const lvl = (club.academy && club.academy.level) || 1;
  const n = 1 + (chance(0.4+lvl*0.1)?1:0) + (lvl>=4&&chance(0.4)?1:0);
  const intake = [];
  for(let i=0;i<n;i++){
    const pos = pick(ALL_POS);
    const p = makePlayer(pos, [16,18], -10 + lvl*1.5);
    p.pot = clamp(Math.max(p.pot, p.ovr + rint(8, 14+lvl*3)), p.ovr, 99); setPotential(p);
    p.pot = clamp(Math.max(p.pot, p.ovr + rint(8, 14+lvl*3)), p.ovr, 99);
    p.teamId = club.id; p.salary = Math.min(p.salary, 0.4); p.years = rint(2,4); p.youth = true;
    G.players[p.id] = p; intake.push(p);
  }
  if(club.userControlled){
    G.youthIntake = intake.map(p=>({ id:p.id, name:p.name, pos:p.pos, ovr:p.ovr, pot:p.pot }));
    if(intake.length) logNews(G,"youth",`🎓 Youth intake: ${intake.map(p=>p.name+" ("+p.pos+" "+p.ovr+"→"+p.pot+")").join(", ")}`, club.id);
  }
}
function refillSquad(G, club){
  let squad = Object.values(G.players).filter(p=>p.teamId===club.id);
  const need = pos => squad.filter(p=>p.pos===pos).length;
  while(squad.filter(p=>p.pos==="GK").length<2){ const p=makePlayer("GK",[19,28],club.div===0?-2:-8); p.teamId=club.id; p.years=rint(1,3); G.players[p.id]=p; squad.push(p); }
  while(squad.length<22){ const p=makePlayer(pick(ALL_POS),[19,29],club.div===0?-2:-8); p.teamId=club.id; p.years=rint(1,3); G.players[p.id]=p; squad.push(p); }
  autoPickXI(club, G.players);
}

/* ----------------------------- hall of fame ---------------------------- */
function hallOfFameCheck(G){
  G.hof = G.hof || [];
  Object.values(G.players).forEach(p=>{
    if(p.age>=34 && (p.career.G>=120 || (p.peakOvr>=88 && p.career.App>=250) || (p.awards||0)>=2)){
      if(!p.hof){ p.hof=true; G.hof.unshift({ id:p.id, name:p.name, pos:p.pos, G:p.career.G, A:p.career.A, App:p.career.App, peak:p.peakOvr, season:G.season }); }
    }
  });
  if(G.hof.length>120) G.hof.length=120;
}

/* ----------------------------- transfers ------------------------------- */
// Buy a player from another club: pay the fee from your budget; he joins your squad.
function buyPlayer(G, p, fee){
  const buyer = G.clubs[G.userTeamId];
  if(buyer.budget < fee) return { ok:false, msg:"Not enough budget for that fee." };
  const seller = p.teamId!=null ? G.clubs[p.teamId] : null;
  buyer.budget = round((buyer.budget - fee)*10)/10;
  if(seller){ seller.budget = round((seller.budget + fee)*10)/10; }
  p.teamId = buyer.id; p.years = Math.max(p.years||0, rint(2,4)); p.salary = wageFor(p);
  autoPickXI(buyer, G.players);
  logNews(G,"transfer",`➡️ Signed ${p.pos} ${p.name} (${p.ovr}) for ${money(fee)}`, buyer.id);
  return { ok:true };
}
// Sell one of your players to an AI club for a fee.
function sellPlayer(G, p, fee, toClubId){
  const seller = G.clubs[G.userTeamId];
  const buyer = toClubId!=null ? G.clubs[toClubId] : null;
  seller.budget = round((seller.budget + fee)*10)/10;
  if(buyer){ buyer.budget = round(Math.max(0, buyer.budget - fee)*10)/10; p.teamId = buyer.id; autoPickXI(buyer, G.players); }
  else { p.teamId = null; G.freeAgents=G.freeAgents||[]; G.freeAgents.push(p); }
  autoPickXI(seller, G.players);
  logNews(G,"transfer",`⬅️ Sold ${p.pos} ${p.name} (${p.ovr}) for ${money(fee)}`, seller.id);
}
// AI clubs occasionally bid for your best/surplus players.
function generateTransferOffers(G){
  G.transferOffers = G.transferOffers || [];
  if(G.transferOffers.length>=4) return;
  const squad = Object.values(G.players).filter(p=>p.teamId===G.userTeamId);
  if(squad.length<=18) return;
  const target = wpick(squad, p=>p.value);
  if(!target) return;
  const suitors = G.clubs.filter(c=>c.id!==G.userTeamId && c.budget>target.value*1.1);
  if(!suitors.length) return;
  const by = pick(suitors);
  const fee = round(target.value * (0.9 + _rng()*0.6) *10)/10;
  G.transferOffers.push({ id:"of"+Date.now()+Math.floor(_rng()*999), playerId:target.id, by:by.id, fee });
  logNews(G,"offer",`💬 ${by.name} bid ${money(fee)} for ${target.name}`, G.userTeamId);
}
// Sign an out-of-contract free agent (no fee; wage only). Squad cap keeps it sane.
function signFreeAgent(G, p){
  const club = G.clubs[G.userTeamId];
  const squad = Object.values(G.players).filter(x=>x.teamId===G.userTeamId);
  if(squad.length>=30) return { ok:false, msg:"Squad is full (30)." };
  G.freeAgents = (G.freeAgents||[]).filter(x=>x.id!==p.id);
  p.teamId = club.id; p.years = rint(1,3); p.salary = wageFor(p);
  G.players[p.id] = p;
  autoPickXI(club, G.players);
  logNews(G,"sign",`✍️ Signed free agent ${p.pos} ${p.name} (${p.ovr})`, club.id);
  return { ok:true };
}
function wageBill(G, clubId){
  return round(Object.values(G.players).filter(p=>p.teamId===clubId).reduce((s,p)=>s+(p.salary||0),0)*10)/10;
}

/* ----------------------------- owner ----------------------------------- */
function setOwnerExpectation(G){
  const c = G.clubs[G.userTeamId];
  if(c.div===1){ G.expectation = { text:"Win promotion back to the "+DIV_NAMES[0], target:"promo" }; return; }
  const last = (c.history||[]).slice(-1)[0];
  const lastPos = last ? last.pos : 12;
  if(lastPos<=4) G.expectation = { text:"Challenge for the title (top 3)", target:"top3" };
  else if(lastPos<=10) G.expectation = { text:"Finish in the top half", target:"top10" };
  else G.expectation = { text:"Avoid relegation", target:"safe" };
}

/* ----------------------------- news ------------------------------------ */
function logNews(G, type, msg, teamId){
  if(!G) return;
  if(!Array.isArray(G.news)) G.news=[];
  G.news.unshift({ season:G.season, day:(G.day||0)+1, phase:G.phase, type, msg, teamId: teamId==null?null:teamId });
  if(G.news.length>250) G.news.length=250;
}

/* ----------------------------- save / load ----------------------------- */
const SAVE_VERSION = 1;
const SLOT_INDEX = "pgsoccer_slots";
const slotKey = id => "pgsoccer_slot_" + id;
function listSlots(){
  try{ const a = JSON.parse(localStorage.getItem(SLOT_INDEX)||"[]"); return Array.isArray(a)?a.sort((x,y)=>y.updated-x.updated):[]; }
  catch(e){ return []; }
}
function saveGame(G){
  try{
    if(!G.slotId) G.slotId = "s" + Date.now() + Math.floor(Math.random()*999);
    localStorage.setItem(slotKey(G.slotId), JSON.stringify(G));
    const u = G.clubs[G.userTeamId];
    const idx = listSlots().filter(s=>s.id!==G.slotId);
    idx.push({ id:G.slotId, club:u?u.name:"—", abbr:u?u.abbr:"", season:G.season, day:(G.day||0)+1, phase:G.phase, updated:Date.now() });
    localStorage.setItem(SLOT_INDEX, JSON.stringify(idx));
    return true;
  }catch(e){ return false; }
}
function loadSlot(id){
  try{ const g = JSON.parse(localStorage.getItem(slotKey(id))); return g?migrate(g):null; }catch(e){ return null; }
}
function deleteSlot(id){
  try{ localStorage.removeItem(slotKey(id)); localStorage.setItem(SLOT_INDEX, JSON.stringify(listSlots().filter(s=>s.id!==id))); }catch(e){}
}
function migrate(G){
  if(!G || !Array.isArray(G.clubs)) return G;
  try{
    let maxId=0; Object.values(G.players||{}).forEach(p=>{ if(typeof p.id==="number"&&p.id>maxId) maxId=p.id; });
    (G.freeAgents||[]).forEach(p=>{ if(p&&typeof p.id==="number"&&p.id>maxId) maxId=p.id; });
    uid.atLeast(maxId);
    if(!Array.isArray(G.news)) G.news=[];
    if(!Array.isArray(G.freeAgents)) G.freeAgents=[];
    if(!Array.isArray(G.transferOffers)) G.transferOffers=[];
    if(!Array.isArray(G.champions)) G.champions=[];
    if(!Array.isArray(G.awardHistory)) G.awardHistory=[];
    if(!Array.isArray(G.hof)) G.hof=[];
    if(!G.settings) G.settings={ injuries:true };
    if(!G.cup) initCup(G);
    G.clubs.forEach(c=>{ if(!c.formation) c.formation="4-3-3"; if(!c.tactic) c.tactic="balanced"; if(!c.academy) c.academy={level:1}; ensureXI(c, G.players); });
    if(!G.expectation) setOwnerExpectation(G);
    G.version = SAVE_VERSION;
  }catch(e){}
  return G;
}
function exportSave(G){
  try{
    const blob = new Blob([JSON.stringify(G)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const u = G.clubs[G.userTeamId];
    a.href=url; a.download=`pocketgm-soccer-${u?u.abbr:"save"}-${G.season}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000); return true;
  }catch(e){ return false; }
}
function importSave(file, onLoad){
  const r = new FileReader();
  r.onload = e=>{ try{ const g=migrate(JSON.parse(e.target.result)); if(g&&Array.isArray(g.clubs)) onLoad(g); else alert("Not a valid Pocket GM Soccer save."); }catch(err){ alert("Couldn't read that save file."); } };
  r.readAsText(file);
}

/* ----------------------------- new game -------------------------------- */
function newGame(userTeamId, opts={}){
  const { clubs, players } = generateLeague(userTeamId, opts);
  const G = {
    season: 2026, day: 0, phase: "regular", version: SAVE_VERSION,
    seed: (opts && opts.seed!=null && !Number.isNaN(opts.seed)) ? (opts.seed>>>0) : null,
    userTeamId, clubs, players,
    schedule: buildSchedule(clubs),
    freeAgents: [], transferOffers: [], news: [], champions: [], awardHistory: [], hof: [],
    cup: null, lastMatch: null, settings: { injuries:true },
  };
  // seed a small free-agent pool
  for(let i=0;i<40;i++){ const p=makePlayer(pick(ALL_POS),[20,33],-4); p.teamId=null; G.freeAgents.push(p); }
  initCup(G);
  setOwnerExpectation(G);
  return G;
}

          <div className="flex items-center justify-between mb-2"><div className="font-semibold">Latest news</div><button onClick={()=>setTab("news")} className="text-xs text-emerald-300">All →</button></div>

}
const ordinal = n => { const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
const gd = c => c.gf - c.ga;
function MiniTable({G, rows, highlight}){
  return (
    <table className="w-full text-sm tnum">
      <thead><tr className="text-slate-500 text-xs"><th className="text-left">#</th><th className="text-left">Club</th><th>Pld</th><th>GD</th><th>Pts</th></tr></thead>
      <tbody>{rows.map((c,i)=>(
        <tr key={c.id} className={c.id===highlight?"text-emerald-300 font-semibold":""}>
          <td>{i+1}</td><td className="text-left">{c.abbr}</td><td className="text-center">{c.pld}</td>
          <td className="text-center">{gd(c)>=0?"+":""}{gd(c)}</td><td className="text-center font-semibold">{c.pts}</td>
        </tr>))}
      </tbody>
    </table>
  );
}

/* ----------------------------- squad ----------------------------------- */

/* ----------------------------- tactics / formation --------------------- */
function Tactics({G, commit, tShow}){
  const user = G.clubs[G.userTeamId];
  const slots = FORMATIONS[user.formation] || FORMATIONS["4-3-3"];
  const coords = pitchCoords(slots);
  const [pickSlot, setPickSlot] = useState(null);   // slot index being assigned
  ensureXI(user, G.players);
  const squad = Object.values(G.players).filter(p=>p.teamId===user.id && !isInjured(p));
  const setFormation = f => { user.formation=f; autoPickXI(user, G.players); commit(G); };
  const setTactic = t => { user.tactic=t; commit(G); };
  const assign = (slotIdx, pid) => {
    const xi = (user.xi||[]).slice();
    const existing = xi.indexOf(pid);
    if(existing>=0){ const tmp=xi[slotIdx]; xi[slotIdx]=pid; xi[existing]=tmp; }  // swap
    else xi[slotIdx]=pid;
    user.xi = xi; autoFillBench(user, G.players); commit(G); setPickSlot(null);
  };
  const u = unitRatings(user, G.players);
  return (
    <div className="space-y-3">
      <Card>
        <div className="flex flex-wrap items-center gap-2">
          <span className="text-sm text-slate-400">Formation</span>
          <select value={user.formation} onChange={e=>setFormation(e.target.value)} className="bg-[#16213a] rounded px-2 py-1 text-sm">
            {FORMATION_NAMES.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
          <span className="text-sm text-slate-400 ml-2">Tactic</span>
          {["defensive","balanced","attacking"].map(t=>(
            <button key={t} onClick={()=>setTactic(t)} className={"px-2 py-1 rounded text-xs capitalize "+((user.tactic||"balanced")===t?"bg-emerald-500 text-slate-900":"bg-[#16213a] text-slate-300")}>{t}</button>
          ))}
          <button onClick={()=>{ autoPickXI(user, G.players); commit(G); tShow("Auto-picked best XI"); }} className="ml-auto px-3 py-1 rounded bg-[#16213a] text-slate-200 text-xs">Auto-pick XI</button>
        </div>
        <div className="flex gap-4 mt-2 text-xs text-slate-400">
          <span>DEF <b className="text-slate-200">{round(u.DEF)}</b></span>
          <span>MID <b className="text-slate-200">{round(u.MID)}</b></span>
          <span>ATT <b className="text-slate-200">{round(u.ATT)}</b></span>
          <span>Overall <b className="text-emerald-300">{clubStrength(user, G.players)}</b></span>
        </div>
      </Card>

      <Card>
        <div className="relative w-full rounded-lg overflow-hidden" style={{aspectRatio:"3/4", background:"linear-gradient(#0f3d24,#0c2e1b)"}}>
          {/* pitch markings */}
          <div className="absolute inset-2 border border-emerald-200/20 rounded"></div>
          <div className="absolute left-2 right-2 top-1/2 border-t border-emerald-200/20"></div>
          {slots.map((slot,i)=>{
            const pid = (user.xi||[])[i]; const p = pid!=null?G.players[pid]:null;
            const pen = p ? posPenalty(p, slot) : 0;
            const c = coords[i];
            return (
              <button key={i} onClick={()=>setPickSlot(i)}
                style={{ left:c.x+"%", top:c.y+"%", transform:"translate(-50%,-50%)" }}
                className="absolute flex flex-col items-center">
                <div className={"w-11 h-11 rounded-full flex items-center justify-center text-sm font-bold border-2 "+(p? (pen>0?"bg-orange-500/90 border-orange-300 text-slate-900":"bg-emerald-500 border-emerald-200 text-slate-900") : "bg-[#16213a] border-slate-500 text-slate-400")}>
                  {p? p.ovr : slot}
                </div>
                <div className="text-[10px] mt-0.5 text-white/90 font-medium max-w-[64px] truncate">{p? p.name.split(" ").slice(-1)[0] : slot}</div>
                <div className="text-[9px] text-emerald-200/80">{slot}{pen>0?" ⚠":""}</div>
              </button>
            );
          })}
        </div>
        <div className="text-xs text-slate-400 mt-2">Tap a position to assign a player. <span className="text-orange-400">Orange = out of position</span> (rating penalty). A player can fill any of his listed positions with no penalty.</div>
      </Card>

      {pickSlot!=null && (
        <SlotPicker G={G} slot={slots[pickSlot]} squad={squad} xi={user.xi||[]}
          onPick={pid=>assign(pickSlot, pid)} onClose={()=>setPickSlot(null)} />
      )}

      <Card>
        <div className="font-semibold mb-2">Bench</div>
        <div className="flex flex-wrap gap-2">
          {(user.bench||[]).map(id=>{ const p=G.players[id]; if(!p) return null; return (
            <div key={id} className="px-2 py-1 rounded bg-[#16213a] text-sm flex items-center gap-2">
              <OvrPill v={p.ovr} /><PName p={p} /><span className="text-xs text-slate-500">{p.pos}</span>
            </div>
          ); })}
        </div>
      </Card>
    </div>
  );
}
function autoFillBench(club, players){
  const used = new Set(club.xi||[]);
  const rest = Object.values(players).filter(p=>p.teamId===club.id && !used.has(p.id) && !isInjured(p)).sort((a,b)=>b.ovr-a.ovr);
  club.bench = rest.slice(0,9).map(p=>p.id);
}
function SlotPicker({G, slot, squad, xi, onPick, onClose}){
  const ranked = squad.slice().sort((a,b)=>effRating(b,slot)-effRating(a,slot));
  return (
    <div className="fixed inset-0 bg-black/60 z-40 flex items-end sm:items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#101a30] border border-[#1d2940] rounded-xl w-full max-w-md max-h-[70vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="p-3 border-b border-[#1d2940] flex items-center justify-between sticky top-0 bg-[#101a30]">
          <div className="font-semibold">Assign at <span className="text-emerald-300">{slot}</span></div>
          <button onClick={onClose} className="text-slate-400">✕</button>
        </div>
        <div className="p-2 space-y-1">
          {ranked.map(p=>{
            const pen = posPenalty(p, slot); const eff = effRating(p,slot);
            const inXi = xi.includes(p.id);
            return (
              <button key={p.id} onClick={()=>onPick(p.id)} className="w-full flex items-center gap-2 p-2 rounded hover:bg-[#16213a] text-left">
                <OvrPill v={p.ovr} />
                <div className="flex-1">
                  <div className="font-medium">{p.name} {inXi&&<span className="text-xs text-emerald-400">(in XI)</span>}</div>
                  <div className="text-xs text-slate-400">{posLabel(p)} · {p.age}y</div>
                </div>
                <div className={"text-sm font-semibold "+(pen>0?"text-orange-400":"text-emerald-300")}>{pen>0?`${eff} (-${pen})`:"natural"}</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

}
function ResultDot({home, g}){
  const us = home?g.hs:g.as, them = home?g.as:g.hs;
  const c = us>them?"bg-emerald-500":us<them?"bg-red-500":"bg-slate-500";
  return <span className={"inline-block w-2 h-2 rounded-full ml-1 "+c}></span>;
}

/* ----------------------------- transfers ------------------------------- */
function Transfers({G, commit, tShow}){
  const user = G.clubs[G.userTeamId];
  const [tab, setTab] = useState("buy");
  const [q, setQ] = useState("");
  // BUY: other clubs' players, affordable-ish
  let market = Object.values(G.players).filter(p=>p.teamId!=null && p.teamId!==user.id);
  if(q) market = market.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
  market.sort((a,b)=>b.ovr-a.ovr);
  market = market.slice(0,80);
  const squad = Object.values(G.players).filter(p=>p.teamId===user.id);
  const offers = G.transferOffers||[];
  const feeFor = p => round(p.value * 1.15 *10)/10;
  const doBuy = p => { const fee=feeFor(p); const r=buyPlayer(G,p,fee); if(r.ok){ commit(G); tShow(`Signed ${p.name}`); } else tShow(r.msg); };
  const doSell = p => { const fee=round(p.value*0.9*10)/10; sellPlayer(G,p,fee,null); commit(G); tShow(`Sold ${p.name} for ${money(fee)}`); };
  const acceptOffer = o => { const p=G.players[o.playerId]; if(!p){ G.transferOffers=offers.filter(x=>x.id!==o.id); commit(G); return; } sellPlayer(G,p,o.fee,o.by); G.transferOffers=offers.filter(x=>x.id!==o.id); commit(G); tShow(`Accepted ${money(o.fee)} for ${p.name}`); };
  const rejectOffer = o => { G.transferOffers=offers.filter(x=>x.id!==o.id); commit(G); };
  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div className="font-semibold">Transfer Market</div>
          <div className="text-sm text-slate-400">Budget {money(user.budget)} · Squad {squad.length}/30</div>
        </div>
        <div className="flex gap-2 mt-2 text-sm">
          {[["buy","Buy"],["sell","Sell"],["offers","Offers"+(offers.length?` (${offers.length})`:"")]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} className={"px-3 py-1 rounded "+(tab===k?"bg-emerald-500 text-slate-900 font-semibold":"bg-[#16213a] text-slate-300")}>{l}</button>
          ))}
          <button onClick={()=>{ generateTransferOffers(G); commit(G); tShow("Market checked"); }} className="ml-auto px-3 py-1 rounded bg-[#16213a] text-slate-300 text-xs">Generate offer</button>
        </div>
      </Card>

      {tab==="buy" && (
        <>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search players…" className="w-full bg-[#16213a] rounded px-3 py-2 text-sm" />
          <Card className="p-0 overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="text-slate-500 text-xs border-b border-[#1d2940]"><th className="text-left p-2">Player</th><th className="p-2">Club</th><th className="p-2">Pos</th><th className="p-2">OVR</th><th className="p-2">Age</th><th className="p-2">Fee</th><th className="p-2"></th></tr></thead>
              <tbody>
                {market.map(p=>(
                  <tr key={p.id} className="border-b border-[#15203a]">
                    <td className="p-2 text-left"><PName p={p} className="font-medium" /></td>
                    <td className="p-2 text-center text-slate-400">{G.clubs[p.teamId].abbr}</td>
                    <td className="p-2 text-center"><PosTag p={p} /></td>
                    <td className="p-2 text-center"><OvrPill v={p.ovr} /></td>
                    <td className="p-2 text-center tnum">{p.age}</td>
                    <td className="p-2 text-center tnum">{money(feeFor(p))}</td>
                    <td className="p-2 text-center"><button onClick={()=>doBuy(p)} disabled={user.budget<feeFor(p)} className={"px-2 py-1 rounded text-xs font-semibold "+(user.budget<feeFor(p)?"bg-[#16213a] text-slate-500":"bg-emerald-500 text-slate-900")}>Buy</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </>
      )}
      {tab==="sell" && (
        <Card className="p-0 overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="text-slate-500 text-xs border-b border-[#1d2940]"><th className="text-left p-2">Player</th><th className="p-2">Pos</th><th className="p-2">OVR</th><th className="p-2">Age</th><th className="p-2">Sale</th><th className="p-2"></th></tr></thead>
            <tbody>
              {squad.slice().sort((a,b)=>b.value-a.value).map(p=>(
                <tr key={p.id} className="border-b border-[#15203a]">
                  <td className="p-2 text-left"><PName p={p} className="font-medium" /></td>
                  <td className="p-2 text-center"><PosTag p={p} /></td>
                  <td className="p-2 text-center"><OvrPill v={p.ovr} /></td>
                  <td className="p-2 text-center tnum">{p.age}</td>
                  <td className="p-2 text-center tnum">{money(round(p.value*0.9*10)/10)}</td>
                  <td className="p-2 text-center"><button onClick={()=>{ if(squad.length<=14){ tShow("Squad too small to sell."); return; } doSell(p); }} className="px-2 py-1 rounded bg-[#16213a] text-slate-200 text-xs">Sell</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
      {tab==="offers" && (
        <div className="space-y-2">
          {offers.length===0 && <Card><div className="text-slate-400 text-sm">No incoming offers. Tap “Generate offer” or play matches to attract interest.</div></Card>}
          {offers.map(o=>{ const p=G.players[o.playerId]; const by=G.clubs[o.by]; if(!p) return null; return (
            <Card key={o.id}>
              <div className="flex items-center gap-2 flex-wrap">
                <div className="flex-1">
                  <div className="font-semibold">{by.name} bid {money(o.fee)}</div>
                  <div className="text-sm text-slate-400">for <PName p={p} className="text-slate-200" /> ({p.pos} {p.ovr}, valued {money(p.value)})</div>
                </div>
                <button onClick={()=>acceptOffer(o)} className="px-3 py-1.5 rounded bg-emerald-500 text-slate-900 text-sm font-semibold">Accept</button>
                <button onClick={()=>rejectOffer(o)} className="px-3 py-1.5 rounded bg-[#16213a] text-slate-200 text-sm">Reject</button>
              </div>
            </Card>
          ); })}
        </div>
      )}
    </div>
  );
}
